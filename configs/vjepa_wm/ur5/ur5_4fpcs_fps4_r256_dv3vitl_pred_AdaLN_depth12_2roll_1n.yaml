app: vjepa_wm
nodes: 1
tasks_per_node: 1
cpus_per_task: 8
folder: ${JEPAWM_LOGS}/ur5/ur5_4fpcs_fps4_r256_dv3vitl_pred_AdaLN_depth12_2roll_1n
data:
  # Dataset configuration
  dataset_type: custom
  datasets:
    - UR5
  datasets_weights: null
  seed: 42
  img_size: 256
  # Validation configuration
  validation:
    val_datasets: null
    num_frames_val: 5
    val_dataset_batch_size: 8
    val_dataset_drop_last: false
    val_dataset_fpcs: [12]
    val_dataset_camera_views:
      - left_mp4_path
    val_viz_rank0_loader: false
    val_datasets_1: null
  # DataLoader configuration
  loader:
    batch_size: 4
    num_workers: 12
    pin_mem: true
    persistent_workers: true
  # Custom dataset parameters
  custom:
    split_ratio: null
    frameskip: 1
    action_skip: 1
    state_skip: 1
    normalize_action: false
    traj_subset: true
    filter_first_episodes: null
    filter_tasks: null
    num_hist: null
    num_pred: null
    with_reward: null
    custom_teleop_dset: null
  # Droid-specific parameters (reused for UR5 - same data format)
  droid:
    camera_frame: null
    camera_views:
      - left_mp4_path
    droid_to_rcasa_action_format: 1
    rcasa_to_droid_action_format: null
    fps: 4
    dataset_fpcs: [12]
    mpk_manifest_patterns: null
data_aug:
  auto_augment: false
  random_horizontal_flip: false
  motion_shift: false
  random_resize_aspect_ratio:
    - 1.
    - 1.
  random_resize_scale:
    - 1.777
    - 1.777
  reprob: 0.0
  normalize: [[0.485, 0.456, 0.406], [0.229, 0.224, 0.225]]
logging:
  write_tag: jepa
  wandb:
    use_wandb: true
    debug: false
    project: vjepa_wm_ur5
    disable_wandb_media: true
    log_media_locally: true
loss:
  cos_loss_weight: 0.0
  l1_loss_weight: 0.0
  l2_loss_weight: 1.0
  smooth_l1_loss_weight: 0.0
meta:
  plan_only_eval_mode: false
  light_eval_only_mode: false
  unroll_decode_eval_only_mode: false
  quick_debug: false
  freeze_encoder: true
  load_checkpoint: true
  load_opt_scale_epoch: true
  read_checkpoint: null
  seed: 42
  eval_freq: 3
  light_eval_freq: 62
  save_every_freq: 3
  dtype: bfloat16
  data_traj_rollout_eval:
    do_data_traj_rollout_eval: true
    data_traj_eval_rollout_steps: 6
    data_traj_decode_gt: true
    data_traj_eval_ctxt_window: 3
  energy_landscape_eval:
    do_energy_landscape_eval: false
    energy_landscape_rollout_steps: 1
    energy_landscape_ctxt_window: 3
model:
  # Shared fields
  grid_size: 16
  tubelet_size_enc: 1
  use_activation_checkpointing: false
  action_conditioning: token
  proprio_encoding: none
  num_frames_pred: 12
  # Visual encoder config
  visual_encoder:
    enc_type: dino
    enc_version: dinov3_vitl16
    pretrain_enc_path: null
    pretrain_enc_ckpt_key: null
    embed_dim: 1024
    enc_use_rope: null
    enc_name: null
    use_sdpa_enc: null
    num_frames_enc: null
    uniform_power: true
  # Action encoder config
  action_encoder:
    action_tokens: 1
    action_emb_dim: 0
    act_mlp: false
    action_encoder_inpred: true
  # Proprio encoder config
  proprio_encoder:
    proprio_tokens: 0
    proprio_emb_dim: 0
    prop_mlp: false
    proprio_encoder_inpred: false
  # Predictor config — JEPA-WM AdaLN
  predictor:
    tubelet_size: 1
    pred_num_heads: 16
    pred_depth: 12
    pred_embed_dim: 1024
    pred_use_extrinsics: false
    pred_type: AdaLN
    act_pred_projector: null
    use_SiLU: null
    use_rope: true
  # VideoWM encoding()
  wm_encoding:
    batchify_video: true
    dup_image: false
    normalize_reps: false
  # Rollout config
  rollout_cfg:
    rollout_steps: 6
    train_rollout_prefixes: random
    rollout_stop_gradient: true
    ctxt_window_train_rollout: 3
    do_parallel_rollout: null
    do_sequential_rollout: true
    prepend_gt: null
    sampling_scheduler:
      type: linear
      start: 0.
      end: 0.
  # Attention config
  attn:
    local_window_time: 3
    local_window_h: -1
    local_window_w: -1
  # Decoder heads
  heads_cfg:
    architectures:
      image_head:
        kind: vit
        config:
          patch_size: 8
          in_chans: 3
          img_size: [256, 256]
          embed_dim: 1024
          decoder_embed_dim: 1024
          depth: 12
          num_heads: 16
          mlp_ratio: 4.0
          num_views: 1
          use_activation_checkpointing: true
          use_lpips: false
    pretrain_dec_path: null
optimization:
  main_optimizer: transition_model
  train_heads: true
  heads:
    image_head:
      use_radamw: false
      betas: [0.9, 0.999]
      eps: 1.e-8
      ipe_scale: 1.0
      weight_decay: 0.1
      final_weight_decay: 0.1
      final_lr: 1.e-6
      start_lr: 0.0
      ref_lr: 5.e-4
      warmup: 10
      num_epochs: 200
      iterations_per_epoch: 64
      clip_grad: 1.0
      mixed_precision: true
  transition_model:
    iterations_per_epoch: null
    ipe_scale: 1.
    clip_grad: 1.0
    use_radamw: false
    betas: [0.9, 0.995]
    eps: 1.e-8
    weight_decay: 1.e-7
    final_weight_decay: 1.e-6
    num_epochs: 200
    warmup: 10
    start_lr: 5.e-4
    ref_lr: 5.e-4
    final_lr: 5.e-4
    mixed_precision: true
evals:
  separate: false
  decode: false
  eval_episodes: 0
  dump_eval_configs: false
  eval_cfg_paths: []
unroll_decode_evals:
  specific_video: false
  specific_video_path: null
  play_in_reverse: false
  save_decoding_only: true
  repeat_hardcode_act: 1
  obs: rgb
  wrapper_kwargs:
    ctxt_window: 2
